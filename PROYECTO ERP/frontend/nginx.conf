# Frontend SPA: sirve estaticos hasheados con cache largo, fallback a index.html.
# Si el backend esta en el mismo compose / pod, descomentar el bloque de proxy /api.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion gzip para texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/x-javascript image/svg+xml;

    # Security headers basicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback - cualquier ruta no-existente entrega index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets hasheados por Vite -> cache aggressive (1 ano, immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker NO cachear (debe re-validar siempre)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Manifest PWA tampoco se cachea
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
    }

    # Index.html nunca cacheado (siempre re-validar para detectar nuevos deploys)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Reverse proxy al backend Flask (descomentar si backend corre en el mismo network)
    # location /api/ {
    #     proxy_pass http://backend:8080/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # WebSocket SocketIO (descomentar si aplica)
    # location /socket.io/ {
    #     proxy_pass http://backend:8080/socket.io/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_read_timeout 86400;
    # }

    # 404 fallback al index.html (SPA)
    error_page 404 /index.html;
}
