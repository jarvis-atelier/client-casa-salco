name: Deploy

# Deploys solo en tags semver (v1.2.3) - protege contra deploys accidentales desde main.
# Para deploys manuales, usa workflow_dispatch.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "fly"
        type: choice
        options:
          - fly
          - railway
          - both

concurrency:
  group: deploy-production
  cancel-in-progress: false  # NO cancelar deploys (peligroso)

jobs:
  deploy-fly:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event.inputs.target == 'fly' || github.event.inputs.target == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test healthz
        run: |
          sleep 15
          curl --fail --max-time 30 https://jarvis-core.fly.dev/healthz || exit 1

  deploy-railway:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.target == 'railway' || github.event.inputs.target == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=jarvis-core
