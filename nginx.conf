events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 999M;

    map $http_upgrade $connection_upgrade {
        default "Upgrade";
        '' "close";
    }

    # =========================
    # LAAGENCIA (HTTPS)
    # =========================
    server {
        listen 443 ssl;
        server_name laagencia.myvnc.com;

	access_log logs/laagencia.access.log;
	error_log  logs/laagencia.error.log info;

        ssl_certificate      C:/Users/Administrador/Desktop/nginx-1.27.2/nginx-1.27.2/ssl/2025/laagencia_myvnc_com.crt;
        ssl_certificate_key  C:/Users/Administrador/Desktop/nginx-1.27.2/nginx-1.27.2/ssl/2025/myserver.key;
        ssl_trusted_certificate C:/Users/Administrador/Desktop/nginx-1.27.2/nginx-1.27.2/ssl/2025/DigiCertCA.crt;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'HIGH:!aNULL:!MD5';
        ssl_prefer_server_ciphers on;


location = /aricanacoursecreator {
  return 301 /aricanacoursecreator/;
}

location ^~ /aricanacoursecreator/ {
  # le sacamos el prefijo al path antes de llegar a Flask
  rewrite ^/aricanacoursecreator(/.*)$ $1 break;

  proxy_pass http://127.0.0.1:5003;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # esto lo consume ProxyFix (x_prefix=1)
  proxy_set_header X-Forwarded-Prefix /aricanacoursecreator;

  # cookie de sesión válida para el subpath
  proxy_cookie_path / /aricanacoursecreator/;

  proxy_read_timeout 1200s;
  proxy_send_timeout 1200s;
  proxy_connect_timeout 60s;

  proxy_request_buffering off;
  proxy_buffering off;
}

# =========================
# AUTOBIT — Giuliano PMV (Flask, port 5009)
# =========================
location = /autobit {
  return 301 /autobit/;
}

location ^~ /autobit/ {
  # quitamos el prefijo antes de llegar a Flask
  rewrite ^/autobit(/.*)$ $1 break;

  proxy_pass http://127.0.0.1:5009;

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header X-Forwarded-Port  $server_port;

  # ProxyFix (x_prefix=1) lo lee para construir url_for con el prefijo
  proxy_set_header X-Forwarded-Prefix /autobit;

  # cookies de sesión bajo el subpath para no chocar con otras apps
  proxy_cookie_path / /autobit/;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  proxy_read_timeout 1200s;
  proxy_send_timeout 1200s;
  proxy_connect_timeout 60s;

  proxy_request_buffering off;
  proxy_buffering        off;

  client_max_body_size 10M;
}

# =========================
# CASA SALCO — ERP (Flask + React PWA, port 5005)
# =========================
location = /casasalco {
  return 301 /casasalco/;
}

location ^~ /casasalco/ {
  proxy_pass http://127.0.0.1:5005;

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header X-Forwarded-Port  $server_port;
  proxy_set_header X-Forwarded-Prefix /casasalco;

  proxy_cookie_path / /casasalco/;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  proxy_read_timeout 1200s;
  proxy_send_timeout 1200s;
  proxy_connect_timeout 60s;

  proxy_request_buffering off;
  proxy_buffering        off;

  # OCR sube imágenes hasta unos cuantos MB.
  client_max_body_size 50M;
}


